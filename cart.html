<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart — Shiftable</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:#f0f4f8;color:#0f172a;font-family:'Manrope',sans-serif;}
nav{display:flex;align-items:center;justify-content:space-between;padding:.75rem 2rem;background:#0f172a;position:sticky;top:0;z-index:100;gap:1rem;}
.logo{text-decoration:none;}
.logo-shift{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;color:#fff;}
.logo-able{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;color:#38bdf8;}
.logo-arrow{font-size:.9rem;color:#38bdf8;position:relative;top:-3px;}
.nav-links a{font-size:.82rem;color:#94a3b8;text-decoration:none;margin-left:1.5rem;}
.nav-links a:hover{color:#fff;}
.nav-cart{font-size:.82rem;color:#38bdf8;text-decoration:none;padding:.4rem .85rem;border:1.5px solid #334155;font-weight:700;}
.btn-nav-ghost{font-size:.82rem;color:#94a3b8;text-decoration:none;padding:.4rem .85rem;border:1.5px solid #334155;}
.btn-nav-primary{font-size:.82rem;background:#38bdf8;color:#fff;text-decoration:none;padding:.4rem .9rem;font-weight:600;}
.nav-username{font-size:.82rem;font-weight:600;color:#fff;padding:.4rem .75rem;border:1.5px solid #334155;cursor:pointer;}
.nav-dropdown{position:absolute;top:100%;right:0;background:#fff;border:1px solid #e2e8f0;min-width:160px;display:none;flex-direction:column;box-shadow:0 8px 24px rgba(0,0,0,.15);z-index:200;}
.nav-user-menu{position:relative;}
.nav-user-menu:hover .nav-dropdown{display:flex;}
.nav-dropdown a{padding:.65rem 1rem;font-size:.85rem;color:#475569;text-decoration:none;}
.nav-dropdown a:hover{background:#f0f9ff;color:#38bdf8;}

.page-header{background:#0f172a;padding:1.5rem 2rem;color:#fff;}
.page-header h1{font-family:'Syne',sans-serif;font-size:1.75rem;font-weight:800;}

.main{max-width:1100px;margin:2rem auto;padding:0 2rem;display:grid;grid-template-columns:1fr 340px;gap:2rem;align-items:start;}
@media(max-width:768px){.main{grid-template-columns:1fr;}}

/* CART ITEMS */
.cart-section{background:#fff;border:1px solid #e2e8f0;}
.cart-section-header{padding:1.25rem 1.5rem;border-bottom:1px solid #e2e8f0;display:flex;justify-content:space-between;align-items:center;}
.cart-section-header h2{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;}
.cart-section-header span{font-size:.82rem;color:#64748b;}
.cart-item{padding:1.25rem 1.5rem;border-bottom:1px solid #f1f5f9;display:flex;gap:1rem;align-items:flex-start;}
.cart-item:last-child{border-bottom:none;}
.ci-icon{width:60px;height:60px;background:linear-gradient(135deg,#f0f9ff,#e0f2fe);display:flex;align-items:center;justify-content:center;font-size:1.75rem;flex-shrink:0;}
.ci-info{flex:1;}
.ci-name{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;margin-bottom:.2rem;}
.ci-seller{font-size:.75rem;color:#38bdf8;margin-bottom:.25rem;}
.ci-type{font-size:.75rem;color:#64748b;}
.ci-right{text-align:right;}
.ci-price{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;margin-bottom:.5rem;}
.ci-per{font-size:.72rem;color:#64748b;margin-bottom:.5rem;}
.ci-remove{font-size:.78rem;color:#ef4444;background:none;border:none;cursor:pointer;font-family:'Manrope',sans-serif;}
.ci-remove:hover{text-decoration:underline;}

.empty-cart{padding:4rem;text-align:center;color:#64748b;}
.empty-cart .empty-icon{font-size:3rem;margin-bottom:1rem;}
.empty-cart h3{font-family:'Syne',sans-serif;font-size:1.25rem;font-weight:700;margin-bottom:.5rem;color:#0f172a;}
.empty-cart p{font-size:.88rem;margin-bottom:1.5rem;}
.empty-cart a{background:#38bdf8;color:#fff;padding:.75rem 1.75rem;font-weight:700;text-decoration:none;font-size:.9rem;}

/* ORDER SUMMARY */
.summary-box{background:#fff;border:1px solid #e2e8f0;padding:1.5rem;position:sticky;top:80px;}
.summary-box h3{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;margin-bottom:1.25rem;padding-bottom:.75rem;border-bottom:1px solid #e2e8f0;}
.summary-row{display:flex;justify-content:space-between;font-size:.88rem;margin-bottom:.6rem;}
.summary-row .key{color:#64748b;}
.summary-row .val{font-weight:600;}
.summary-divider{height:1px;background:#e2e8f0;margin:1rem 0;}
.summary-total{display:flex;justify-content:space-between;margin-bottom:1.5rem;}
.summary-total .key{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;}
.summary-total .val{font-family:'Syne',sans-serif;font-size:1.25rem;font-weight:800;color:#0f172a;}
.checkout-btn{width:100%;background:#38bdf8;color:#fff;border:none;padding:1rem;font-family:'Manrope',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:background .2s;margin-bottom:.75rem;}
.checkout-btn:hover{background:#0ea5e9;}
.checkout-btn:disabled{background:#94a3b8;cursor:not-allowed;}
.continue-btn{width:100%;background:transparent;color:#475569;border:1.5px solid #e2e8f0;padding:.75rem;font-family:'Manrope',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s;}
.continue-btn:hover{border-color:#38bdf8;color:#38bdf8;}
.secure-note{text-align:center;font-size:.75rem;color:#94a3b8;margin-top:.75rem;}

/* CHECKOUT FORM */
.checkout-form{display:none;margin-top:1.5rem;border-top:1px solid #e2e8f0;padding-top:1.5rem;}
.checkout-form h4{font-family:'Syne',sans-serif;font-size:.95rem;font-weight:700;margin-bottom:1rem;}
.field{margin-bottom:.85rem;}
.field label{display:block;font-size:.72rem;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.3rem;}
.field input,.field textarea{width:100%;border:1.5px solid #e2e8f0;padding:.6rem .85rem;font-size:.88rem;outline:none;font-family:'Manrope',sans-serif;color:#0f172a;transition:border-color .2s;}
.field input:focus,.field textarea:focus{border-color:#38bdf8;}
.field textarea{resize:vertical;min-height:80px;}
.place-btn{width:100%;background:#0f172a;color:#fff;border:none;padding:1rem;font-family:'Manrope',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:background .2s;}
.place-btn:hover{background:#1e293b;}
.order-msg{font-size:.82rem;text-align:center;margin-top:.75rem;padding:.6rem;font-weight:500;}
.order-msg.error{color:#dc2626;background:#fef2f2;}
.order-msg.success{color:#16a34a;background:#f0fdf4;}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="logo"><span class="logo-shift">Shift</span><span class="logo-able">able</span><span class="logo-arrow">↑</span></a>
  <div class="nav-links">
    <a href="marketplace.html">Marketplace</a>
    <a href="shiftable-systems.html">Shiftable Systems</a>
  </div>
  <div style="display:flex;align-items:center;gap:.75rem;">
    <a href="cart.html" class="nav-cart">🛒 Cart</a>
    <div id="navAuth">
      <a href="auth.html" class="btn-nav-ghost">Log In</a>
      <a href="auth.html?tab=signup" class="btn-nav-primary">Sign Up</a>
    </div>
  </div>
</nav>

<div class="page-header">
  <h1>Your Cart</h1>
</div>

<div class="main">
  <div>
    <div class="cart-section" id="cartSection">
      <div class="cart-section-header">
        <h2>Cart Items</h2>
        <span id="cartItemCount">Loading...</span>
      </div>
      <div id="cartItems"><div class="empty-cart"><div class="empty-icon">🛒</div><p>Loading your cart...</p></div></div>
    </div>
  </div>

  <div>
    <div class="summary-box">
      <h3>Order Summary</h3>
      <div id="summaryRows"></div>
      <div class="summary-divider"></div>
      <div class="summary-total"><span class="key">Monthly Total</span><span class="val" id="summaryTotal">$0</span></div>
      <button class="checkout-btn" id="checkoutBtn" onclick="showCheckout()">Proceed to Checkout</button>
      <button class="continue-btn" onclick="window.location.href='marketplace.html'">Continue Shopping</button>
      <p class="secure-note">🔒 Secure checkout powered by Stripe</p>

      <div class="checkout-form" id="checkoutForm">
        <h4>Your Information</h4>
        <div class="field"><label>Full Name</label><input type="text" id="checkName" placeholder="Your name"></div>
        <div class="field"><label>Email</label><input type="email" id="checkEmail" placeholder="your@email.com"></div>
        <div class="field"><label>Business Name</label><input type="text" id="checkBiz" placeholder="Your business name"></div>
        <div class="field"><label>Phone</label><input type="tel" id="checkPhone" placeholder="(720) 555-0100"></div>
        <div class="field"><label>Notes for seller (optional)</label><textarea id="checkNotes" placeholder="Any details about your business, requirements, etc."></textarea></div>
        <button class="place-btn" onclick="placeOrder()">Place Order →</button>
        <div id="orderMsg" class="order-msg" style="display:none;"></div>
      </div>
    </div>
  </div>
</div>

<script>
let cartProducts = [];
let currentUser = null;

async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) {
    window.location.href = 'auth.html';
    return;
  }
  currentUser = session.user;
  document.getElementById('navAuth').innerHTML = `
    <div class="nav-user-menu">
      <span class="nav-username">${session.user.email.split('@')[0]}</span>
      <div class="nav-dropdown">
        <a href="buyer-dashboard.html">Dashboard</a>
        <a href="#" onclick="handleLogout()">Log Out</a>
      </div>
    </div>`;

  await loadCart();
}

async function loadCart() {
  const { data: items } = await sb.from('cart_items').select('*, products(*)').eq('user_id', currentUser.id);
  cartProducts = items || [];
  renderCart();
  renderSummary();
}

function renderCart() {
  const container = document.getElementById('cartItems');
  document.getElementById('cartItemCount').textContent = cartProducts.length + ' item' + (cartProducts.length !== 1 ? 's' : '');

  if (!cartProducts.length) {
    container.innerHTML = `
      <div class="empty-cart">
        <div class="empty-icon">🛒</div>
        <h3>Your cart is empty</h3>
        <p>Browse the marketplace to find AI systems for your business</p>
        <a href="marketplace.html">Browse Marketplace</a>
      </div>`;
    document.getElementById('checkoutBtn').disabled = true;
    return;
  }

  container.innerHTML = cartProducts.map(item => {
    const p = item.products;
    return `
      <div class="cart-item">
        <div class="ci-icon">${getIcon(p.icon)}</div>
        <div class="ci-info">
          <div class="ci-name">${p.name}</div>
          <div class="ci-seller">${p.is_shiftable_original ? 'Shiftable Systems' : 'Seller'}</div>
          <div class="ci-type">${p.price_type === 'month' ? 'Monthly subscription' : 'One-time purchase'}</div>
        </div>
        <div class="ci-right">
          <div class="ci-price">$${p.price}</div>
          <div class="ci-per">/${p.price_type}</div>
          <button class="ci-remove" onclick="removeItem('${item.id}')">Remove</button>
        </div>
      </div>`;
  }).join('');
}

function renderSummary() {
  const rows = document.getElementById('summaryRows');
  const total = cartProducts.reduce((sum, item) => sum + (item.products ? item.products.price : 0), 0);
  rows.innerHTML = cartProducts.map(item => `
    <div class="summary-row">
      <span class="key">${item.products ? item.products.name : ''}</span>
      <span class="val">$${item.products ? item.products.price : 0}/${item.products ? item.products.price_type : ''}</span>
    </div>`).join('');
  document.getElementById('summaryTotal').textContent = '$' + total + '/mo';
}

async function removeItem(cartItemId) {
  await sb.from('cart_items').delete().eq('id', cartItemId);
  await loadCart();
  updateCartCount();
  showToast('Item removed');
}

function showCheckout() {
  if (!cartProducts.length) return;
  document.getElementById('checkoutForm').style.display = 'block';
  document.getElementById('checkoutBtn').style.display = 'none';
  document.getElementById('checkName').value = currentUser.user_metadata?.full_name || '';
  document.getElementById('checkEmail').value = currentUser.email || '';
  document.getElementById('checkoutForm').scrollIntoView({ behavior: 'smooth' });
}

async function placeOrder() {
  const name = document.getElementById('checkName').value.trim();
  const email = document.getElementById('checkEmail').value.trim();
  const biz = document.getElementById('checkBiz').value.trim();
  const phone = document.getElementById('checkPhone').value.trim();
  const notes = document.getElementById('checkNotes').value.trim();
  const msg = document.getElementById('orderMsg');

  if (!name || !email) {
    msg.textContent = 'Please fill in your name and email';
    msg.className = 'order-msg error';
    msg.style.display = 'block';
    return;
  }

  msg.textContent = 'Processing your order...';
  msg.className = 'order-msg';
  msg.style.display = 'block';

  const total = cartProducts.reduce((sum, item) => sum + (item.products ? item.products.price : 0), 0);
  const productNames = cartProducts.map(i => i.products ? i.products.name : '').join(', ');

  const fd = new FormData();
  fd.append('_subject', 'New Shiftable Order — ' + productNames);
  fd.append('buyer_name', name);
  fd.append('buyer_email', email);
  fd.append('business_name', biz);
  fd.append('phone', phone);
  fd.append('products_ordered', productNames);
  fd.append('monthly_total', '$' + total + '/month');
  fd.append('notes', notes);

  try {
    const r = await fetch('https://formspree.io/f/xykozdjq', { method: 'POST', body: fd, headers: { Accept: 'application/json' } });
    if (r.ok) {
      await sb.from('cart_items').delete().eq('user_id', currentUser.id);
      msg.textContent = '✓ Order placed! We will reach out to you at ' + email + ' within 24 hours to get started.';
      msg.className = 'order-msg success';
      document.getElementById('cartItems').innerHTML = '<div class="empty-cart"><div class="empty-icon">✓</div><h3>Order Submitted!</h3><p>Check your email — we will be in touch within 24 hours.</p><a href="marketplace.html">Continue Shopping</a></div>';
      document.getElementById('summaryRows').innerHTML = '';
      document.getElementById('summaryTotal').textContent = '$0';
    } else {
      msg.textContent = 'Something went wrong. Please email reyhlejackson3@gmail.com';
      msg.className = 'order-msg error';
    }
  } catch(e) {
    msg.textContent = 'Connection error. Please try again.';
    msg.className = 'order-msg error';
  }
}

init();
</script>
</body>
</html>
